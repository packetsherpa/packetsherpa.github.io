<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} &middot; {% endif %}Walking in Sober Boots</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% feed_meta %}
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="{{ '/soberboots/' | relative_url }}">Walking in Sober Boots</a>
    <p class="site-tagline">Footfalls on a Recovery Path</p>
  </header>

  <main class="content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p><a href="{{ '/soberboots/' | relative_url }}">Home</a> &middot;
       <a href="{{ '/soberboots/feed.xml' | relative_url }}">RSS</a> &middot;
       archived {{ 'now' | date: "%Y" }}</p>
  </footer>
</body>
</html>
