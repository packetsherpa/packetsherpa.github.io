title: Walking in Sober Boots
description: A recovery blog archived from 2013 through 2023.
url: "https://packetsherpa.github.io"
baseurl: ""

# --- blog: "Walking in Sober Boots" lives under /soberboots/ ---
permalink: /soberboots/:year/:month/:day/:title/

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-archives
  - jekyll-paginate-v2

# jekyll-paginate-v2 (drives /soberboots/ post list)
pagination:
  enabled: true
  per_page: 15
  permalink: "/page/:num/"
  sort_field: date
  sort_reverse: true

# jekyll-archives (tag + category index pages)
jekyll-archives:
  enabled: [tags, categories]
  layouts:
    tag: archive
    category: archive
  permalinks:
    tag: "/soberboots/tag/:name/"
    category: "/soberboots/category/:name/"

feed:
  path: soberboots/feed.xml

defaults:
  - scope: { path: "", type: posts }
    values: { layout: post }

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
