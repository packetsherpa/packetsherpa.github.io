---
layout: default
title: Tags
permalink: /soberboots/tags/
---
<article class="archive">
  <h1 class="post-title">Tags</h1>
  <ul class="term-cloud">
    {% assign tags = site.tags | sort %}
    {% for tag in tags %}
    {% assign tslug = tag[0] | slugify %}
    <li><a href="{{ '/soberboots/tag/' | append: tslug | append: '/' | relative_url }}">{{ tag[0] }}</a> <span class="count">{{ tag[1] | size }}</span></li>
    {% endfor %}
  </ul>
  <p><a href="{{ '/soberboots/' | relative_url }}">&larr; All posts</a></p>
</article>
