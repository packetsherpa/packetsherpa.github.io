---
layout: default
title: Categories
permalink: /soberboots/categories/
---
<article class="archive">
  <h1 class="post-title">Categories</h1>
  <ul class="term-cloud">
    {% assign cats = site.categories | sort %}
    {% for cat in cats %}
    {% assign cslug = cat[0] | slugify %}
    <li><a href="{{ '/soberboots/category/' | append: cslug | append: '/' | relative_url }}">{{ cat[0] }}</a> <span class="count">{{ cat[1] | size }}</span></li>
    {% endfor %}
  </ul>
  <p><a href="{{ '/soberboots/' | relative_url }}">&larr; All posts</a></p>
</article>
